<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0f172a; color: #ffffff; margin: 0; }
        .bg-navy { background-color: #101D36; }
        .text-navy { color: #101D36; }
        .text-gold { color: #FFD700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* The exact Search Bar style from your picture */
        .search-container {
            position: relative;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .search-input {
            width: 100%;
            padding: 12px 8px;
            border: none;
            outline: none;
            color: #101D36;
            font-weight: 700;
            font-size: 14px;
            border-radius: 12px;
        }

        .cart-drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
            background: white; z-index: 100; transition: 0.4s; color: #101D36;
        }
        .cart-drawer.open { right: 0; }
        
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
    </style>
</head>
<body>

    <div class="bg-red-600 py-1.5 overflow-hidden border-b border-white/10">
        <p class="animate-marquee text-white font-[900] text-[10px] uppercase tracking-tighter">
            🔥 SPECIAL DISCOUNT ON EVERY ITEM! VISIT TODAY & SAVE BIG! 🔥
        </p>
    </div>

    <nav class="sticky top-0 z-50 bg-navy p-4 flex justify-between items-center border-b border-gold/20">
        <div>
            <h1 class="font-[900] text-xl leading-none uppercase tracking-widest">
                <span class="text-gold">BHAVANI</span> <span class="text-white">MART</span>
            </h1>
            <p class="text-[9px] font-bold text-white/80 uppercase mt-1 tracking-widest">+91 9182841682</p>
        </div>
        <button onclick="toggleCart()" class="bg-green-600 text-white px-3 py-1.5 rounded-md font-black text-[10px] uppercase shadow-lg">My List</button>
    </nav>

    <section class="py-8 text-center px-4">
        <h2 class="text-2xl font-[900] text-gold uppercase mb-6 leading-none">BHAVANI HYPER MART</h2>
        
        <div class="max-w-md mx-auto px-2">
            <div class="search-container">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="itemSearch" onkeyup="render()" placeholder="Search 10,000+ items..." class="search-input">
            </div>
        </div>
    </section>

    <div class="p-4 text-center space-y-4 max-w-md mx-auto">
        <h3 class="text-white font-black text-lg uppercase tracking-tight">
            <span class="text-gold">TIRED OF TYPING?</span><br>
            TAKE A PHOTO OF YOUR LIST!
        </h3>
        <div class="grid grid-cols-2 gap-3 px-2">
            <a href="https://wa.me/919182841682" class="bg-gold text-navy py-3 rounded-full text-[10px] font-[900] flex items-center justify-center gap-2 uppercase shadow-xl">📸 WhatsApp</a>
            <a href="#" class="bg-white text-navy py-3 rounded-full text-[10px] font-[900] flex items-center justify-center gap-2 uppercase border-2 border-gold shadow-xl">📍 Directions</a>
        </div>
    </div>

    <div class="bg-slate-50 min-h-screen mt-6">
        <div class="p-3 overflow-x-auto no-scrollbar flex gap-2" id="catFilters">
            <button onclick="setCategory('all')" class="bg-navy text-gold px-4 py-2 rounded-lg text-[9px] font-black uppercase whitespace-nowrap">All Items</button>
        </div>

        <main class="p-2 mb-24">
            <div id="productGrid" class="grid grid-cols-3 md:grid-cols-6 gap-2">
                </div>
        </main>
    </div>

    <div id="cartOverlay" class="fixed inset-0 bg-black/70 z-[90] hidden" onclick="toggleCart()"></div>
    <div id="cartDrawer" class="cart-drawer flex flex-col p-6 shadow-2xl">
        <div class="flex justify-between items-center border-b-2 pb-4 mb-4">
            <h2 class="font-black text-xl text-navy">My List</h2>
            <button onclick="toggleCart()" class="text-red-600 font-black text-xs">CLOSE</button>
        </div>
        <div id="cartItems" class="flex-grow overflow-y-auto space-y-3"></div>
        <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-black uppercase mt-4">Send to WhatsApp</button>
    </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQK4lAzDWObCjowN-SuMvzqFpz46ePH4kDCYBrdMCY3A1Uz2pv_ooVR8h2c8JNNpZmKxsSVaq7dDOQc/pub?gid=0&single=true&output=csv';
        let allItems = [];
        let cart = [];
        let activeCat = 'all';

        async function loadData() {
            try {
                const res = await fetch(sheetUrl);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                allItems = rows.map(r => {
                    const parts = r.split(',');
                    return { 
                        category: parts[0]?.replace(/"/g, '').trim().toUpperCase() || 'GENERAL', 
                        name: parts[1]?.replace(/"/g, '').trim() || '',
                        img: parts[2]?.replace(/"/g, '').trim() || '',
                        price: parts[3]?.replace(/"/g, '').trim() || '',
                        mrp: parts[4]?.replace(/"/g, '').trim() || ''
                    };
                }).filter(i => i.name.length > 1);
                generateCategoryButtons();
                render();
            } catch (e) { console.error("Data error"); }
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = allItems.filter(i => (activeCat === 'all' || i.category === activeCat) && i.name.toLowerCase().includes(query));
            
            grid.innerHTML = filtered.map((i, idx) => `
                <div class="bg-white rounded-xl p-2 flex flex-col border border-slate-100 shadow-sm text-navy">
                    <div class="h-16 flex items-center justify-center mb-1">
                        <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" class="max-h-full object-contain">
                    </div>
                    <h4 class="text-[9px] font-[800] uppercase h-6 overflow-hidden leading-tight mb-1">${i.name}</h4>
                    
                    <div class="flex flex-col mb-2">
                        <span class="text-[11px] font-[900] leading-none">₹${i.price}</span>
                        <span class="text-[8px] text-slate-300 line-through font-normal mt-0.5">₹${i.mrp}</span>
                    </div>

                    <button onclick="addToCart('${i.name.replace(/'/g, "\\'")}')" 
                            class="w-full border border-green-600 text-green-700 py-1 rounded-lg text-[8px] font-black uppercase">
                        ADD
                    </button>
                </div>
            `).join('');
        }

        function generateCategoryButtons() {
            const cats = [...new Set(allItems.map(i => i.category))];
            const container = document.getElementById('catFilters');
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "bg-white text-navy border border-slate-200 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase whitespace-nowrap";
                btn.innerText = c;
                btn.onclick = (e) => {
                    activeCat = c;
                    document.querySelectorAll('#catFilters button').forEach(b => b.className = "bg-white text-navy border border-slate-200 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase whitespace-nowrap");
                    e.target.className = "bg-navy text-gold px-3 py-1.5 rounded-lg text-[9px] font-black uppercase whitespace-nowrap";
                    render();
                };
                container.appendChild(btn);
            });
        }

        function addToCart(name) { cart.push({name}); updateCart(); }
        function updateCart() {
            const container = document.getElementById('cartItems');
            container.innerHTML = cart.map((item, i) => `<div class="p-2 border rounded text-navy flex justify-between text-[10px] font-bold"><span>${item.name}</span><button onclick="removeItem(${i})">✕</button></div>`).join('');
        }
        function removeItem(i) { cart.splice(i, 1); updateCart(); }
        function sendOrder() {
            let msg = "Order:\n" + cart.map(item => item.name).join('\n');
            window.location.href = `https://wa.me/919182841682?text=${encodeURIComponent(msg)}`;
        }
        function toggleCart() { 
            document.getElementById('cartDrawer').classList.toggle('open'); 
            document.getElementById('cartOverlay').classList.toggle('hidden'); 
        }
        function setCategory(c) { activeCat = c; render(); }
        loadData();
    </script>
</body>
</html>
