<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Your Daily Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-navy { background-color: #0a2351; }
        .text-sky { color: #00d2ff; }
        .bg-sky { background-color: #00d2ff; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .discount-flash { background: linear-gradient(90deg, #ff0055, #ff5e00); }
        .admin-section { display: none; }
    </style>
</head>
<body class="bg-slate-50">

    <div class="bg-navy text-white py-2 overflow-hidden whitespace-nowrap border-b border-sky/30">
        <div class="inline-block animate-marquee">
            <span class="mx-4 text-[10px] font-black tracking-widest uppercase">
                <i class="fas fa-star text-sky"></i> Special Discount on Every Item <i class="fas fa-star text-sky"></i> Free Delivery Over ₹1000 <i class="fas fa-star text-sky"></i> Wholesale Rates in Karmanghat
            </span>
        </div>
    </div>

    <nav class="bg-white p-4 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-navy leading-none tracking-tighter">
                    BHAVANI<span class="text-sky">.MART</span>
                </h1>
                <p class="text-[9px] font-bold text-slate-400 tracking-[.3em] uppercase">Hypermarket</p>
            </div>
            <a href="https://wa.me/919182841682" class="bg-navy text-white px-5 py-2 rounded-full font-black text-[10px] flex items-center gap-2 transition active:scale-95 shadow-lg shadow-navy/20">
                <i class="fab fa-whatsapp text-lg text-green-400"></i> ORDER NOW
            </a>
        </div>
    </nav>

    <div class="bg-white px-4 pb-6 pt-2 border-b">
        <div class="container mx-auto max-w-2xl relative">
            <input type="text" id="itemSearch" onkeyup="filterItems()" placeholder="Search for groceries, snacks, household..." class="w-full bg-slate-100 p-4 pl-12 rounded-2xl border-none outline-none focus:ring-2 focus:ring-sky/50 text-sm font-medium">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
        </div>
    </div>

    <div class="bg-white py-4 overflow-x-auto no-scrollbar border-b">
        <div class="flex gap-3 px-4 container mx-auto">
            <button onclick="setCategory('all')" class="bg-sky text-navy px-6 py-2 rounded-xl text-xs font-black uppercase shadow-sm">All</button>
            <button onclick="setCategory('GROCERY')" class="bg-slate-50 text-navy px-6 py-2 rounded-xl text-xs font-black border border-slate-100 uppercase">Grocery</button>
            <button onclick="setCategory('SPICES')" class="bg-slate-50 text-navy px-6 py-2 rounded-xl text-xs font-black border border-slate-100 uppercase">Spices</button>
            <button onclick="setCategory('CLEANING')" class="bg-slate-50 text-navy px-6 py-2 rounded-xl text-xs font-black border border-slate-100 uppercase">Cleaning</button>
        </div>
    </div>

    <main class="container mx-auto p-4 mb-20">
        <div class="flex items-center justify-between mb-6 px-1">
            <h3 class="font-black text-navy uppercase text-sm tracking-widest">Store Inventory</h3>
            <span class="text-[10px] font-bold text-sky bg-sky/10 px-2 py-1 rounded">DISCOUNTS APPLIED</span>
        </div>
        
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            </div>
    </main>

    <footer class="bg-white border-t p-8 mt-10">
        <div class="container mx-auto text-center">
            <div class="mb-6">
                <p class="text-[11px] font-black text-navy uppercase mb-2">Location</p>
                <p class="text-xs text-slate-500 leading-relaxed">
                    H NO 8-1-12/G1, Narayana Heights,<br>
                    Kranthi Nagar, Karmanghat, Hyd-79
                </p>
                <a href="tel:+919182841682" class="inline-block mt-4 text-sky font-black text-sm tracking-tighter">
                    <i class="fas fa-phone-alt"></i> +91 9182841682
                </a>
            </div>

            <button onclick="showAdmin()" class="text-[9px] text-slate-300 font-bold tracking-widest uppercase hover:text-sky">Manager Login</button>
            
            <div id="adminArea" class="admin-section mt-5 bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-200">
                <input type="text" id="newProdName" placeholder="Product Name" class="w-full p-3 rounded-xl mb-3 border text-sm">
                <select id="newProdCat" class="w-full p-3 rounded-xl mb-3 border text-sm">
                    <option value="GROCERY">Grocery</option>
                    <option value="SPICES">Spices</option>
                    <option value="CLEANING">Cleaning</option>
                </select>
                <button onclick="addProduct()" class="w-full bg-navy text-white p-3 rounded-xl font-black text-xs uppercase tracking-widest">Add to Store</button>
            </div>
        </div>
    </footer>

    <script>
        const whatsappNumber = "919182841682";
        let products = [
            { category: "GROCERY", item: "RICE 25KG" },
            { category: "GROCERY", item: "TOOR DAL" },
            { category: "SPICES", item: "CUMIN SEEDS" },
            { category: "CLEANING", item: "DETERGENT" }
        ];

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="bg-white rounded-3xl p-4 card-shadow border border-slate-50 relative flex flex-col justify-between">
                    <div class="discount-flash absolute top-2 left-2 text-[7px] text-white px-2 py-0.5 rounded-full font-black uppercase">SPECIAL OFFER</div>
                    <div class="pt-4 pb-2 text-center">
                        <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
                            <i class="fas fa-box text-slate-300 text-xl"></i>
                        </div>
                        <h4 class="text-xs font-black text-navy uppercase leading-tight h-8 overflow-hidden">${p.item}</h4>
                        <p class="text-[9px] font-bold text-sky mt-1 italic">${p.category}</p>
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-50 flex justify-between items-center">
                        <div>
                            <p class="text-[8px] text-slate-400 font-bold uppercase">Price</p>
                            <p class="text-[10px] font-black text-red-500 uppercase">BELOW MRP</p>
                        </div>
                        <a href="https://wa.me/${whatsappNumber}?text=Price%20check%20for%20${p.item}" class="bg-navy text-white w-8 h-8 rounded-xl flex items-center justify-center transition active:scale-90">
                            <i class="fas fa-plus text-[10px]"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        function showAdmin() {
            if(prompt("Password:") === "mart79") document.getElementById('adminArea').style.display = "block";
        }

        function addProduct() {
            const name = document.getElementById('newProdName').value.toUpperCase();
            const cat = document.getElementById('newProdCat').value;
            if(name) {
                products.unshift({ category: cat, item: name });
                renderProducts(products);
                document.getElementById('newProdName').value = "";
            }
        }

        function filterItems() {
            const s = document.getElementById('itemSearch').value.toLowerCase();
            renderProducts(products.filter(p => p.item.toLowerCase().includes(s)));
        }

        function setCategory(cat) {
            if(cat === 'all') renderProducts(products);
            else renderProducts(products.filter(p => p.category === cat));
        }

        renderProducts(products);
    </script>
</body>
</html>
