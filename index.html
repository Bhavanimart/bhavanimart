<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhavani Mart | Wholesale Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f3f7fa; color: #1e293b; }
        .bg-navy { background-color: #003366; }
        .text-gold { color: #FFD700; }
        .bg-gold { background-color: #FFD700; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Updated Logo Font: Normal style, Extra Bold weight */
        .logo-font { font-weight: 900 !important; font-style: normal !important; text-transform: uppercase; letter-spacing: -0.05em; }
        
        .hero-banner { 
            background: linear-gradient(rgba(0,51,102,0.85), rgba(0,51,102,0.85)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=80'); 
            background-size: cover; background-position: center;
        }
        .offer-card { border: 2px solid #FFD700; background: #fffbeb; }
        .product-card { border-top: 5px solid #FFD700; transition: transform 0.2s ease; }
    </style>
</head>
<body>

    <div class="bg-red-600 text-white py-2 text-center text-[10px] font-extrabold uppercase tracking-widest">
        🔥 Special Discount on Every Item • Below MRP 🔥
    </div>

    <nav class="bg-navy p-4 sticky top-0 z-50 shadow-xl flex justify-between items-center">
        <div>
            <h1 class="text-2xl logo-font leading-none">
                <span class="text-gold">BHAVANI</span><span class="text-white">MART</span>
            </h1>
            <p class="text-[9px] font-bold text-blue-200 uppercase tracking-widest mt-1">Karmanghat • Wholesale</p>
        </div>
        <a href="https://wa.me/919182841682" class="bg-green-500 text-white px-5 py-2 rounded-full font-800 text-[10px] shadow-lg hover:bg-green-600">ORDER NOW</a>
    </nav>

    <div id="todayOffersSection" class="hidden">
        <div class="bg-gold p-4 border-b-2 border-navy">
            <h2 class="text-navy font-900 text-center text-sm uppercase tracking-tighter mb-4">🌟 TODAY'S EXCLUSIVE OFFERS 🌟</h2>
            <div id="offersGrid" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
        </div>
    </div>

    <section class="hero-banner py-16 text-center text-white px-4 border-b-4 border-gold">
        <h2 class="text-3xl font-900 text-gold uppercase leading-tight tracking-tight">BHAVANI HYPER MART</h2>
        <p class="text-sm font-700 tracking-[0.2em] opacity-90 uppercase mt-2">3000 Sq. Ft. Wholesale Store</p>
    </section>

    <div class="bg-navy p-6 text-center shadow-inner border-y-4 border-gold">
        <h3 class="text-gold font-800 text-base mb-3 uppercase tracking-tight">Tired of typing? Take a photo of your list!</h3>
        <a href="https://wa.me/919182841682" class="bg-gold text-navy px-10 py-3 rounded-full text-[11px] font-800 inline-block shadow-xl hover:scale-105 transition-transform">WHATSAPP LIST PHOTO</a>
    </div>

    <div class="bg-white sticky top-[68px] z-40 border-b shadow-md p-4">
        <div class="max-w-xl mx-auto text-center">
            <input type="text" id="itemSearch" onkeyup="render()" placeholder="Search items (Rice, Soap, Oil)..." class="w-full bg-slate-50 p-4 rounded-2xl border-2 border-slate-100 text-sm mb-4 outline-none focus:border-gold font-medium">
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2" id="catFilters">
                <button onclick="setCategory('all')" class="bg-navy text-gold px-6 py-2 rounded-full text-[10px] font-800 uppercase whitespace-nowrap">All Items</button>
            </div>
        </div>
    </div>

    <main class="container mx-auto p-4 py-10 mb-20">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <footer class="bg-navy text-white p-12 text-center">
        <p class="text-2xl font-800 text-gold mb-2 tracking-tighter">+91 9182841682</p>
        <p class="text-[9px] opacity-30">© 2026 Bhavani Mart</p>
    </footer>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQK4lAzDWObCjowN-SuMvzqFpz46ePH4kDCYBrdMCY3A1Uz2pv_ooVR8h2c8JNNpZmKxsSVaq7dDOQc/pub?gid=0&single=true&output=csv';
        
        let allItems = [];
        let activeCat = 'all';

        async function loadData() {
            try {
                const res = await fetch(sheetUrl);
                const data = await res.text();
                const rows = data.split('\n').slice(1);
                
                allItems = rows.map(r => {
                    const parts = r.split(',');
                    const priceRaw = parts[3]?.replace(/"/g, '').trim() || '';
                    let mrp = '', offer = priceRaw;

                    if (priceRaw.includes('/')) {
                        const splitPrice = priceRaw.split('/');
                        mrp = splitPrice[0].trim();
                        offer = splitPrice[1].trim();
                    }

                    return { 
                        category: parts[0]?.replace(/"/g, '').trim().toUpperCase(), 
                        name: parts[1]?.replace(/"/g, '').trim(),
                        img: parts[2]?.replace(/"/g, '').trim() || '',
                        mrp: mrp,
                        offer: offer
                    };
                }).filter(i => i.name && i.name.length > 1 && !i.name.includes('<'));

                renderOffers();
                generateCategoryButtons();
                render();
            } catch (e) { console.error("Data error"); }
        }

        function formatPriceHTML(mrp, offer) {
            if (mrp && mrp !== "") {
                return `<span class="text-slate-400 line-through text-[10px] font-bold mr-2">₹${mrp}</span>
                        <span class="text-red-600 font-900 text-sm">₹${offer}</span>`;
            }
            return `<span class="text-navy font-800 text-sm">₹${offer || 'Best Price'}</span>`;
        }

        function renderOffers() {
            // Updated category detection to handle variations like TODAY OFFER'S
            const offers = allItems.filter(i => i.category.includes('TODAY OFFER'));
            const section = document.getElementById('todayOffersSection');
            const grid = document.getElementById('offersGrid');

            if (offers.length > 0) {
                section.classList.remove('hidden');
                grid.innerHTML = offers.map(i => `
                    <div class="min-w-[150px] bg-white rounded-2xl p-3 shadow-md offer-card text-center relative">
                        <div class="bg-red-600 text-white text-[8px] font-800 px-2 py-0.5 rounded absolute top-2 right-2 shadow-sm">DEAL</div>
                        <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" 
                             class="h-20 mx-auto object-contain mb-2"
                             onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'">
                        <h4 class="text-[10px] font-800 text-navy uppercase leading-tight h-8 overflow-hidden">${i.name}</h4>
                        <div class="my-1">${formatPriceHTML(i.mrp, i.offer)}</div>
                        <a href="https://wa.me/919182841682?text=Order Offer: ${i.name}" class="block bg-navy text-gold text-[8px] py-1.5 rounded-lg font-800 uppercase tracking-tighter">Order Now</a>
                    </div>
                `).join('');
            }
        }

        function generateCategoryButtons() {
            const cats = [...new Set(allItems.map(i => i.category))].filter(c => c && c !== "CATEGORY" && !c.includes("TODAY OFFER"));
            const container = document.getElementById('catFilters');
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = "bg-white text-navy border-2 border-slate-100 px-6 py-2 rounded-full text-[10px] font-800 uppercase whitespace-nowrap shadow-sm hover:border-gold transition-colors";
                btn.innerText = c;
                btn.onclick = () => setCategory(c);
                container.appendChild(btn);
            });
        }

        function render() {
            const grid = document.getElementById('productGrid');
            const query = document.getElementById('itemSearch').value.toLowerCase();
            const filtered = allItems.filter(i => (activeCat === 'all' || i.category === activeCat) && i.name.toLowerCase().includes(query));

            grid.innerHTML = filtered.map(i => `
                <div class="bg-white rounded-3xl shadow-lg overflow-hidden flex flex-col justify-between product-card group relative">
                    <div class="absolute top-3 left-3 bg-red-600 text-white text-[7px] font-800 px-2 py-1 rounded-md z-10 shadow-md italic uppercase">Special Price</div>
                    <div class="h-40 bg-white flex items-center justify-center p-5">
                        <img src="${i.img || 'https://cdn-icons-png.flaticon.com/512/3081/3081840.png'}" 
                             class="max-h-full max-w-full object-contain mix-blend-multiply group-hover:scale-110 transition-transform"
                             onerror="this.src='https://cdn-icons-png.flaticon.com/512/3081/3081840.png'">
                    </div>
                    
                    <div class="p-5 text-center bg-slate-50 border-t border-slate-100">
                        <p class="text-[8px] font-800 text-blue-500 uppercase tracking-widest mb-1 opacity-70">${i.category}</p>
                        <h4 class="text-[12px] font-800 text-navy uppercase leading-tight h-10 overflow-hidden mb-1">${i.name}</h4>
                        <div class="mb-3">${formatPriceHTML(i.mrp, i.offer)}</div>
                        <a href="https://wa.me/919182841682?text=Order: ${i.name}" 
                           class="block bg-navy text-gold py-3 rounded-2xl text-[10px] font-800 shadow-md active:scale-95 transition-transform uppercase tracking-tighter">Order Now</a>
                    </div>
                </div>
            `).join('');
        }

        function setCategory(c) { activeCat = c; render(); }
        loadData();
    </script>
</body>
</html>
